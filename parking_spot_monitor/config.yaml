name: Parking Spot Monitor
description: Monitor fixed parking spots via camera snapshots and license plate recognition
version: "1.0.1"
slug: parking_spot_monitor
init: false
arch:
  - aarch64
  - amd64
  - armv7
startup: application
boot: auto
webui: http://[HOST]:[PORT:8099]/
ingress: true
ingress_port: 8099
panel_icon: mdi:car-parking-lights
panel_title: Parking Spots
homeassistant_api: true
options:
  ha_url: http://supervisor/core
  snapshot_interval_minutes: 5
  mqtt_enabled: true
  mqtt_broker: core-mosquitto
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  mqtt_topic_prefix: parking_spot
  cameras: []
schema:
  ha_url: str
  snapshot_interval_minutes: int(1,60)?
  mqtt_enabled: bool
  mqtt_broker: str
  mqtt_port: port
  mqtt_username: str
  mqtt_password: password
  mqtt_topic_prefix: str
  cameras:
    - entity_id: str
      name: str
