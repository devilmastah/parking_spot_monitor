name: Parking Spot Monitor
description: Monitor parking bays via ESP32-CAM snapshots and roof-mounted ArUco markers
version: "2.0.2"
slug: parking_spot_monitor
init: false
arch:
  - aarch64
  - amd64
  - armv7
startup: application
boot: auto
webui: http://[HOST]:[PORT:8099]/
ingress: true
ingress_port: 8099
panel_icon: mdi:car-parking-lights
panel_title: Parking Spots
homeassistant_api: true
options:
  ha_url: http://supervisor/core
  snapshot_interval_minutes: 5
  capture_delay_seconds: 3
  flash_before_capture: true
  aruco_dictionary: DICT_4X4_50
  mqtt_enabled: true
  mqtt_broker: core-mosquitto
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  mqtt_topic_prefix: parking_spot
  bays: []
schema:
  ha_url: str
  snapshot_interval_minutes: int(1,60)?
  capture_delay_seconds: int(1,30)?
  flash_before_capture: bool
  aruco_dictionary: str
  mqtt_enabled: bool
  mqtt_broker: str
  mqtt_port: port
  mqtt_username: str
  mqtt_password: password
  mqtt_topic_prefix: str
  bays:
    - name: str
      camera_entity_id: str
