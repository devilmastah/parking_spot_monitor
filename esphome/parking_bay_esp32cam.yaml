# Parking bay ESP32-CAM — ESPHome device config
#
# Copy this folder into your ESPHome config directory, then:
#   1. Copy secrets.yaml.example → secrets.yaml and fill in WiFi/API keys
#   2. Change substitutions below for each bay (unique device_slug per camera)
#   3. Flash via ESPHome dashboard
#   4. Add camera.parking_bay_X to Parking Spot Monitor add-on config
#
# Home Assistant exposes:
#   camera.{device_slug}           — snapshot source for the add-on
#   script.{device_slug}_prepare_capture — flash + settle (called before snapshot)
#   button.{device_slug}_test_flash  — manual flash test during install

substitutions:
  device_slug: parking-bay-1          # unique per bay → esphome.name (lowercase, hyphens)
  friendly_name: Parking Bay 1        # shown in Home Assistant
  bay_label: "1"                      # label only (logs / AP SSID)
  flash_pin: GPIO4                    # AI-Thinker ESP32-CAM flash LED
  # Camera: SVGA is a good balance for ArUco on roof; use 1280x1024 if PSRAM is stable
  camera_resolution: 800x600
  camera_jpeg_quality: "8"

esphome:
  name: ${device_slug}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: false
  platformio_options:
    board_build.flash_mode: dio
    board_build.f_flash: 40000000L
    board_build.f_cpu: 240000000L

esp32:
  board: esp32dev
  framework:
    type: arduino

psram:
  mode: octal
  speed: 80MHz

logger:
  level: INFO

api:
  encryption:
    key: !secret api_encryption_key
  services:
    - service: prepare_capture
      then:
        - script.execute: prepare_capture

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  fast_connect: true
  ap:
    ssid: "${device_slug}-setup"
    password: !secret ap_password

captive_portal:

# Required so scripts appear as HA services (script.parking_bay_1_prepare_capture)
homeassistant:

# ── Flash LED (AI-Thinker ESP32-CAM = GPIO4) ─────────────────────────────────
output:
  - platform: ledc
    pin: ${flash_pin}
    id: flash_led
    channel: 2
    frequency: 5000 Hz

light:
  - platform: monochromatic
    output: flash_led
    name: "${friendly_name} Flash"
    id: flash_light
    restore_mode: ALWAYS_OFF
    default_transition_length: 0s

# ── Camera (on-demand snapshots via Home Assistant camera_proxy) ─────────────
esp32_camera:
  name: ${friendly_name}
  id: bay_camera
  external_clock:
    pin: GPIO0
    frequency: 20MHz
  i2c_pins:
    sda: GPIO26
    scl: GPIO27
  data_pins: [GPIO5, GPIO18, GPIO19, GPIO21, GPIO36, GPIO39, GPIO34, GPIO35]
  vsync_pin: GPIO25
  href_pin: GPIO23
  pixel_clock_pin: GPIO22
  power_down_pin: GPIO32
  resolution: ${camera_resolution}
  jpeg_quality: ${camera_jpeg_quality}
  vertical_flip: false
  horizontal_mirror: false
  # Low idle rate — Parking Spot Monitor pulls stills one bay at a time
  max_framerate: 0.5 fps
  idle_framerate: 0.1 fps

# ── Scripts ──────────────────────────────────────────────────────────────────
script:
  # Called by Parking Spot Monitor (or manually) before taking a snapshot.
  # Turns on the flash briefly so ArUco markers read clearly at night.
  - id: prepare_capture
    mode: single
    then:
      - logger.log:
          level: INFO
          format: "Bay ${bay_label}: prepare_capture started"
      - light.turn_on:
          id: flash_light
          brightness: 100%
      - delay: 350ms
      - light.turn_off:
          id: flash_light
      - delay: 150ms
      - logger.log:
          level: INFO
          format: "Bay ${bay_label}: prepare_capture done"

  # Quick double-flash to confirm GPIO4 wiring during install
  - id: test_flash
    mode: single
    then:
      - repeat:
          count: 2
          then:
            - light.turn_on:
                id: flash_light
                brightness: 100%
            - delay: 200ms
            - light.turn_off:
                id: flash_light
            - delay: 200ms

# ── Install / debug buttons in HA ────────────────────────────────────────────
button:
  - platform: template
    name: "${friendly_name} Test Flash"
    id: btn_test_flash
    on_press:
      - script.execute: test_flash

  - platform: template
    name: "${friendly_name} Prepare Capture"
    id: btn_prepare_capture
    on_press:
      - script.execute: prepare_capture

# Optional status text in HA (useful when tuning camera aim)
text_sensor:
  - platform: template
    name: "${friendly_name} Info"
    id: bay_info
    update_interval: 60s
    lambda: 'return std::string("ArUco parking bay · ESP32-CAM");'
