substitutions:
  device_slug: parking-bay-10          # unique per bay → esphome.name (lowercase, hyphens)
  friendly_name: Parking Bay 10        # shown in Home Assistant
  bay_label: "1"                      # label only (logs / AP SSID)
  flash_pin: GPIO4                    # AI-Thinker ESP32-CAM flash LED
  # Camera: SVGA is a good balance for ArUco on roof; use 1280x1024 if PSRAM is stable
  camera_resolution: 640x480
  camera_jpeg_quality: "10"
  # Exposure (OV2640). idle_framerate 0 = cold wake — manual shutter avoids short first frame.
  # aec_value 0–1200: higher = longer shutter. Start at 900; try 1000–1100 if still dark.
  camera_aec_mode: manual        # manual | auto
  camera_ae_level: "1"           # auto only: -2 … +2
  camera_aec_value: "600"        # manual shutter time (main brightness control)
  camera_aec2: "false"           # only used in auto mode
  camera_agc_mode: manual        # manual | auto
  camera_agc_value: "10"         # manual only: 0–30 sensor gain
  camera_agc_gain_ceiling: 8x    # auto only: 2x … 128x
  camera_brightness: "0"         # -2 … +2 (use aec_value first, not brightness)
  camera_prepare_delay: 1500ms   # sensor settle after wake (add-on also discards warmup frame)
  # Home Assistant camera entity for debug snapshot button (override per bay file).
  ha_camera_entity: camera.parking_bay_10
  debug_snapshot_file: /config/www/parking_bay_10_debug.jpg

esphome:
  name: ${device_slug}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: false
  on_boot:
    - priority: -100
      then:
        - lambda: |-
            id(bay_camera).set_aec_mode(esphome::esp32_camera::ESP32_GC_MODE_MANU);
            id(bay_camera).set_aec_value((uint32_t) id(exposure_control).state);
            id(bay_camera).update_camera_parameters();
  platformio_options:
    board_build.flash_mode: dio
    board_build.f_flash: 40000000L
    board_build.f_cpu: 240000000L

esp32:
  board: esp32dev
  framework:
    type: arduino
    # Use sdkconfig_options — do NOT use build_flags -DCONFIG_LWIP_MAX_SOCKETS (redefinition error)
    sdkconfig_options:
      CONFIG_LWIP_MAX_SOCKETS: "16"

psram:
  mode: quad

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key
  services:
    - service: prepare_capture
      then:
        - script.execute: prepare_capture
    - service: prepare_capture_flash
      then:
        - script.execute: prepare_capture_flash

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  fast_connect: true

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Parking-Bay-10 Fallback Hotspot"
    password: !secret fallback_password

captive_portal:

# ── Flash LED (AI-Thinker ESP32-CAM = GPIO4) ─────────────────────────────────
output:
  - platform: ledc
    pin: ${flash_pin}
    id: flash_led
    channel: 2
    frequency: 5000 Hz

light:
  - platform: monochromatic
    output: flash_led
    name: "${friendly_name} Flash"
    id: flash_light
    restore_mode: ALWAYS_OFF
    default_transition_length: 0s

# ── Camera (on-demand snapshots via Home Assistant camera_proxy) ─────────────
esp32_camera:
  name: ${friendly_name}
  id: bay_camera
  external_clock:
    pin: GPIO0
    # 10 MHz is more reliable than 20 MHz on many AI-Thinker boards (less EMI)
    frequency: 10MHz
  i2c_pins:
    sda: GPIO26
    scl: GPIO27
  data_pins: [GPIO5, GPIO18, GPIO19, GPIO21, GPIO36, GPIO39, GPIO34, GPIO35]
  vsync_pin: GPIO25
  href_pin: GPIO23
  pixel_clock_pin: GPIO22
  power_down_pin: GPIO32
  resolution: ${camera_resolution}
  jpeg_quality: ${camera_jpeg_quality}
  vertical_flip: false
  horizontal_mirror: false
  brightness: ${camera_brightness}
  contrast: 0
  saturation: 0
  aec_mode: ${camera_aec_mode}
  aec2: ${camera_aec2}
  ae_level: ${camera_ae_level}
  aec_value: ${camera_aec_value}
  agc_mode: ${camera_agc_mode}
  agc_value: ${camera_agc_value}
  agc_gain_ceiling: ${camera_agc_gain_ceiling}
  wb_mode: auto
  # Stop continuous idle captures — camera wakes only when HA requests a frame
  max_framerate: 0.2 fps
  idle_framerate: 0 fps
  on_stream_start:
    - script.execute: apply_camera_exposure

script:
  - id: apply_camera_exposure
    mode: single
    then:
      - lambda: |-
          auto aec = ("${camera_aec_mode}" == std::string("manual"))
              ? esphome::esp32_camera::ESP32_GC_MODE_MANU
              : esphome::esp32_camera::ESP32_GC_MODE_AUTO;
          id(bay_camera).set_aec_mode(aec);
          id(bay_camera).set_aec2("${camera_aec2}" == std::string("true"));
          id(bay_camera).set_ae_level(${camera_ae_level});
          id(bay_camera).set_aec_value((uint32_t) id(exposure_control).state);
          id(bay_camera).set_brightness(${camera_brightness});
          auto agc = ("${camera_agc_mode}" == std::string("manual"))
              ? esphome::esp32_camera::ESP32_GC_MODE_MANU
              : esphome::esp32_camera::ESP32_GC_MODE_AUTO;
          id(bay_camera).set_agc_mode(agc);
          id(bay_camera).set_agc_value(${camera_agc_value});
          esphome::esp32_camera::ESP32AgcGainCeiling gain_ceiling =
              esphome::esp32_camera::ESP32_GAINCEILING_8X;
          const std::string gc = "${camera_agc_gain_ceiling}";
          if (gc == "2x") gain_ceiling = esphome::esp32_camera::ESP32_GAINCEILING_2X;
          else if (gc == "4x") gain_ceiling = esphome::esp32_camera::ESP32_GAINCEILING_4X;
          else if (gc == "16x") gain_ceiling = esphome::esp32_camera::ESP32_GAINCEILING_16X;
          else if (gc == "32x") gain_ceiling = esphome::esp32_camera::ESP32_GAINCEILING_32X;
          else if (gc == "64x") gain_ceiling = esphome::esp32_camera::ESP32_GAINCEILING_64X;
          else if (gc == "128x") gain_ceiling = esphome::esp32_camera::ESP32_GAINCEILING_128X;
          id(bay_camera).set_agc_gain_ceiling(gain_ceiling);
          id(bay_camera).update_camera_parameters();

  - id: debug_snapshot
    mode: single
    then:
      - script.execute:
          id: prepare_capture
          wait: true
      - homeassistant.action:
          action: camera.snapshot
          data:
            entity_id: ${ha_camera_entity}
            filename: ${debug_snapshot_file}

  - id: prepare_capture
    mode: single
    then:
      - script.execute: apply_camera_exposure
      - delay: ${camera_prepare_delay}

  - id: prepare_capture_flash
    mode: single
    then:
      - script.execute: prepare_capture
      - light.turn_on:
          id: flash_light
          brightness: 100%
      - delay: 350ms
      - light.turn_off:
          id: flash_light
      - delay: 150ms

  - id: test_flash
    mode: single
    then:
      - repeat:
          count: 2
          then:
            - light.turn_on:
                id: flash_light
                brightness: 100%
            - delay: 200ms
            - light.turn_off:
                id: flash_light
            - delay: 200ms

# ── Home Assistant controls (device page → Controls / Configuration) ─────────
number:
  - platform: template
    name: "${friendly_name} Exposure"
    id: exposure_control
    entity_category: config
    icon: mdi:shutter-speed
    optimistic: true
    restore_value: true
    initial_value: ${camera_aec_value}
    min_value: 0
    max_value: 1200
    step: 25
    mode: slider
    set_action:
      - lambda: |-
          id(bay_camera).set_aec_mode(esphome::esp32_camera::ESP32_GC_MODE_MANU);
          id(bay_camera).set_aec_value((uint32_t) x);
          id(bay_camera).update_camera_parameters();

button:
  - platform: template
    name: "${friendly_name} Take snapshot"
    entity_category: config
    icon: mdi:camera
    on_press:
      - script.execute:
          id: debug_snapshot
          wait: true

  - platform: template
    name: "${friendly_name} Test Flash"
    on_press:
      - script.execute: test_flash

  - platform: restart
    name: "${friendly_name} Restart"