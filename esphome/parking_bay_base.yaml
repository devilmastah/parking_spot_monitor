# Shared ESP32-CAM parking bay template — do not flash this file directly.
# Create one thin YAML per bay under esphome/bays/ (see bays/parking_bay_11.yaml).

substitutions:
  # Override these in each bay file (required)
  device_slug: parking-bay-1
  friendly_name: Parking Bay 1
  bay_label: "1"
  # Optional overrides (defaults work for most AI-Thinker ESP32-CAM boards)
  flash_pin: GPIO4
  camera_resolution: 640x480
  camera_jpeg_quality: "10"
  ap_ssid: "${device_slug}-setup"

esphome:
  name: ${device_slug}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: false
  platformio_options:
    board_build.flash_mode: dio
    board_build.f_flash: 40000000L
    board_build.f_cpu: 240000000L

esp32:
  board: esp32dev
  framework:
    type: arduino
    sdkconfig_options:
      CONFIG_LWIP_MAX_SOCKETS: "16"

# AI-Thinker ESP32-CAM: quad PSRAM. Comment out if your module has NO PSRAM.
psram:
  mode: quad

logger:
  level: INFO

api:
  encryption:
    key: !secret api_encryption_key
  reboot_timeout: 15min
  services:
    - service: prepare_capture
      then:
        - script.execute: prepare_capture

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  fast_connect: false
  reboot_timeout: 15min
  ap:
    ssid: ${ap_ssid}
    password: !secret ap_password

captive_portal:

output:
  - platform: ledc
    pin: ${flash_pin}
    id: flash_led
    channel: 2
    frequency: 5000 Hz

light:
  - platform: monochromatic
    output: flash_led
    name: "${friendly_name} Flash"
    id: flash_light
    restore_mode: ALWAYS_OFF
    default_transition_length: 0s

esp32_camera:
  name: ${friendly_name}
  id: bay_camera
  external_clock:
    pin: GPIO0
    frequency: 10MHz
  i2c_pins:
    sda: GPIO26
    scl: GPIO27
  data_pins: [GPIO5, GPIO18, GPIO19, GPIO21, GPIO36, GPIO39, GPIO34, GPIO35]
  vsync_pin: GPIO25
  href_pin: GPIO23
  pixel_clock_pin: GPIO22
  power_down_pin: GPIO32
  resolution: ${camera_resolution}
  jpeg_quality: ${camera_jpeg_quality}
  vertical_flip: false
  horizontal_mirror: false
  max_framerate: 0.2 fps
  idle_framerate: 0 fps

script:
  - id: prepare_capture
    mode: single
    then:
      - light.turn_on:
          id: flash_light
          brightness: 100%
      - delay: 350ms
      - light.turn_off:
          id: flash_light
      - delay: 150ms

  - id: test_flash
    mode: single
    then:
      - repeat:
          count: 2
          then:
            - light.turn_on:
                id: flash_light
                brightness: 100%
            - delay: 200ms
            - light.turn_off:
                id: flash_light
            - delay: 200ms

button:
  - platform: template
    name: "${friendly_name} Test Flash"
    on_press:
      - script.execute: test_flash

  - platform: restart
    name: "${friendly_name} Restart"
